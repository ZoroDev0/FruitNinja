<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Play — Fruit Slice Arena</title>
  <meta name="description" content="Play Fruit Slice Arena — slice fruits and score big!" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body class="page-scenic">
<div class="bg-gradient-arena">

  <!-- Navbar -->
  <nav class="navbar glass-navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">
        <svg class="icon icon-2xl" viewBox="0 0 24 24"><path d="m14.5 17.5 3-3 4 4-3 3-4-4z"/><path d="m3 3 9 9"/><path d="M3 3v4l9.5 9.5"/><path d="M14.5 6.5 18 3l3 3-3.5 3.5"/></svg>
        <span class="navbar-brand-text text-gradient-warm">Fruit Slice Arena</span>
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
        <svg class="icon icon-md hamburger-icon" viewBox="0 0 24 24"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
        <svg class="icon icon-md close-icon hidden" viewBox="0 0 24 24"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>
      </button>
      <div class="nav-links" id="navLinks">
        <a href="index.html" class="nav-link"><svg class="icon icon-md" viewBox="0 0 24 24"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg> Home</a>
        <a href="about.html" class="nav-link"><svg class="icon icon-md" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg> About</a>
        <a href="game.html" class="nav-link active"><svg class="icon icon-md" viewBox="0 0 24 24"><line x1="6" x2="10" y1="11" y2="11"/><line x1="8" x2="8" y1="9" y2="13"/><line x1="15" x2="15.01" y1="12" y2="12"/><line x1="18" x2="18.01" y1="10" y2="10"/><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"/></svg> Play Game</a>
        <a href="leaderboard.html" class="nav-link"><svg class="icon icon-md" viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg> Leaderboard</a>
        <a href="community.html" class="nav-link"><svg class="icon icon-md" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Community</a>
      </div>
      <a href="game.html" class="btn btn-primary glow-button" style="font-family:'Orbitron',sans-serif;font-size:0.875rem;letter-spacing:0.05em;padding:0.5rem 1.5rem;">
        Start Game
      </a>
    </div>
  </nav>

  <!-- Game page -->
  <div class="game-page">
    <div class="game-container">

      <!-- HUD -->
      <div class="game-hud">
        <div class="glass-panel neon-border-orange hud-panel">
          <p class="hud-label">Score</p>
          <p class="score-number hud-value text-primary" id="hudScore">0</p>
        </div>
        <div class="glass-panel neon-border-purple hud-panel">
          <div class="hud-label">
            <svg class="icon icon-sm" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Time
          </div>
          <p class="score-number hud-value text-secondary" id="hudTime">60s</p>
        </div>
        <div class="glass-panel neon-border-red hud-panel">
          <p class="hud-label">Lives</p>
          <div class="lives-display" id="hudLives">
            <svg class="icon heart-icon heart-active" viewBox="0 0 24 24"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
            <svg class="icon heart-icon heart-active" viewBox="0 0 24 24"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
            <svg class="icon heart-icon heart-active" viewBox="0 0 24 24"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
          </div>
        </div>
      </div>

      <!-- Canvas -->
      <div class="canvas-wrapper neon-border-orange" id="canvasContainer">
        <canvas id="gameCanvas" class="game-canvas"></canvas>

        <!-- Idle overlay -->
        <div class="game-overlay" id="overlayIdle">
          <h2 class="overlay-title text-gradient-warm">Ready to Slice?</h2>
          <p class="overlay-desc">Click and drag to slice fruits!</p>
          <button class="btn btn-primary glow-button" style="font-family:'Orbitron',sans-serif;letter-spacing:0.1em;padding:0.75rem 2.5rem;font-size:1rem;" onclick="window.gameEngine.start()">
            Start Game
          </button>
        </div>

        <!-- Paused overlay -->
        <div class="game-overlay hidden" id="overlayPaused">
          <h2 class="overlay-title" style="font-size:1.5rem;">Paused</h2>
          <button class="btn btn-primary glow-button" style="font-family:'Orbitron',sans-serif;padding:0.75rem 2rem;" onclick="window.gameEngine.resume()">
            Resume
          </button>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls-row">
        <button class="btn btn-outline" onclick="window.gameEngine.start()">
          <svg class="icon icon-md" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
          Restart
        </button>
        <button class="btn btn-outline" id="btnPauseResume" onclick="window.gameEngine.togglePause()" disabled>
          <svg class="icon icon-md" id="pauseIcon" viewBox="0 0 24 24"><rect x="14" width="4" height="16" rx="1" y="4"/><rect x="6" width="4" height="16" rx="1" y="4"/></svg>
          <svg class="icon icon-md hidden" id="playIcon" viewBox="0 0 24 24"><polygon points="6 3 20 12 6 21 6 3"/></svg>
          <span id="pauseLabel">Pause</span>
        </button>
        <button class="btn btn-outline" id="btnSound" onclick="toggleSound()">
          <svg class="icon icon-md" id="soundOnIcon" viewBox="0 0 24 24"><path d="M11 4.702a.705.705 0 0 0-1.203-.498L6.413 7.587A1.4 1.4 0 0 1 5.416 8H3a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h2.416a1.4 1.4 0 0 1 .997.413l3.383 3.384A.705.705 0 0 0 11 19.298z"/><path d="M16 9a5 5 0 0 1 0 6"/><path d="M19.364 18.364a9 9 0 0 0 0-12.728"/></svg>
          <svg class="icon icon-md hidden" id="soundOffIcon" viewBox="0 0 24 24"><path d="M11 4.702a.705.705 0 0 0-1.203-.498L6.413 7.587A1.4 1.4 0 0 1 5.416 8H3a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h2.416a1.4 1.4 0 0 1 .997.413l3.383 3.384A.705.705 0 0 0 11 19.298z"/><line x1="22" x2="16" y1="9" y2="15"/><line x1="16" x2="22" y1="9" y2="15"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Game Over Overlay (hidden by default) -->
  <div class="game-over-overlay hidden" id="gameOverOverlay">
    <div class="game-over-fruits" id="gameOverFruits"></div>
    <div class="game-over-card glass-panel neon-border-orange">
      <span class="game-over-monkey">🐵</span>
      <h2 class="game-over-title text-gradient-warm">GAME OVER</h2>
      <p class="game-over-player-name" id="gameOverPlayerName"></p>

      <div class="glass-panel score-banner">
        <div class="score-banner-bg"></div>
        <p class="score-banner-label">Final Score</p>
        <p class="score-number score-banner-value" id="finalScore">0</p>
      </div>

      <div class="best-score-row">
        <svg class="icon icon-lg text-game-yellow" viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        <span class="label">Best:</span>
        <span class="score-number value text-secondary" id="bestScoreDisplay">0</span>
      </div>

      <div class="game-over-actions">
        <button class="btn glow-button play-again-btn" onclick="window.gameEngine.start()">
          <svg class="icon icon-lg" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
          Play Again
        </button>
        <div class="game-over-btn-grid">
          <a href="leaderboard.html" style="width:100%;">
            <button class="btn btn-outline" style="width:100%;font-family:'Orbitron',sans-serif;">
              <svg class="icon icon-md" viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
              Ranks
            </button>
          </a>
          <button class="btn btn-outline" style="width:100%;font-family:'Orbitron',sans-serif;" onclick="window.gameEngine.share()">
            <svg class="icon icon-md" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>
            Share
          </button>
        </div>
        <a href="index.html" style="width:100%;">
          <button class="btn btn-outline home-btn" style="width:100%;font-family:'Orbitron',sans-serif;">
            <svg class="icon icon-md" viewBox="0 0 24 24"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"/><path d="M3 10a2 2 0 0 1 .709-1.528l7-5.999a2 2 0 0 1 2.582 0l7 5.999A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            Home
          </button>
        </a>
      </div>

      <div class="game-over-fruit-deco">
        <span>🍊</span><span>🍋</span><span>🍎</span><span>🍇</span><span>🍉</span>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <a href="terms.html">Terms</a>
    <span class="footer-dot">•</span>
    <a href="privacy.html">Privacy</a>
    <span class="footer-dot">•</span>
    <a href="https://sasankawrites.in/" target="_blank" rel="noopener">Visit Portfolio</a>
  </footer>
</div>

<script src="js/share.js"></script>
<script src="js/background.js"></script>
<script src="js/nav-toggle.js"></script>
<script type="module">
  // Firebase integration — save scores to Firestore
  import { db, collection, addDoc, serverTimestamp } from './js/firebase-config.js';
  window.firebaseSaveScore = async function (entry) {
    await addDoc(collection(db, 'leaderboard'), {
      name: entry.name,
      score: entry.score,
      date: entry.date,
      createdAt: serverTimestamp()
    });
  };
</script>
<script src="js/game.js"></script>
<script>
  // small helpers for the page
  let soundOn = true;
  function toggleSound() {
    soundOn = !soundOn;
    document.getElementById('soundOnIcon').classList.toggle('hidden', !soundOn);
    document.getElementById('soundOffIcon').classList.toggle('hidden', soundOn);
  }

  function shareScore() {
    window.gameEngine.share();
  }
</script>
</body>
</html>
