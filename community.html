        <a href="game.html" class="nav-link"><svg class="icon icon-md" viewBox="0 0 24 24"><line x1="6" x2="10" y1="11" y2="11"/><line x1="8" x2="8" y1="9" y2="13"/><line x1="15" x2="15.01" y1="12" y2="12"/><line x1="18" x2="18.01" y1="10" y2="10"/><path d="M17.32 5H6.68a4 4 0 0 0-3.978 3.59c-.006.052-.01.101-.017.152C2.604 9.416 2 14.456 2 16a3 3 0 0 0 3 3c1 0 1.5-.5 2-1l1.414-1.414A2 2 0 0 1 9.828 16h4.344a2 2 0 0 1 1.414.586L17 18c.5.5 1 1 2 1a3 3 0 0 0 3-3c0-1.545-.604-6.584-.685-7.258-.007-.05-.011-.1-.017-.151A4 4 0 0 0 17.32 5z"/></svg> Play Game</a>
        <a href="leaderboard.html" class="nav-link"><svg class="icon icon-md" viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg> Leaderboard</a>
        <a href="community.html" class="nav-link active"><svg class="icon icon-md" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Community</a>

      <a href="game.html" class="btn btn-primary glow-button" style="font-family:'Orbitron',sans-serif;font-size:0.875rem;letter-spacing:0.05em;padding:0.5rem 1.5rem;">
        Start Game
      </a>
    </div>
  </nav>

  <!-- Community page -->
  <div class="community-page">
    <div class="community-container">
      <div class="community-header">
        <div>
          <h1 class="text-gradient-purple">Community</h1>
          <p>Discuss strategies and share your wins</p>
        </div>
        <div class="community-actions">
          <!-- Google Auth -->
          <div class="auth-section" id="authSection">
            <button class="google-sign-in-btn" id="googleSignInBtn">
              <svg class="google-icon" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
              Sign in with Google
            </button>
            <button class="btn btn-outline google-sign-out-btn" id="googleSignOutBtn" style="display:none;font-family:'Orbitron',sans-serif;font-size:0.75rem;">Sign Out</button>
            <img src="" alt="" class="auth-user-avatar" id="userAvatar" style="display:none;" />
            <span class="auth-user-name" id="userName" style="display:none;"></span>
          </div>
          <button class="btn btn-outline btn-admin" style="font-family:'Orbitron',sans-serif;font-size:0.75rem;letter-spacing:0.05em;padding:0.5rem 1rem;">
            <svg class="icon icon-md" viewBox="0 0 24 24"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Admin
          </button>
          <button class="btn btn-primary glow-button btn-create-post" disabled style="font-family:'Orbitron',sans-serif;font-size:0.875rem;letter-spacing:0.05em;opacity:0.5;" title="Sign in with Google to create a post">
            <svg class="icon icon-md" viewBox="0 0 24 24"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            Create Post
          </button>
        </div>
        <p class="sign-in-prompt" id="signInPrompt">Please sign in with Google to create a post.</p>
      </div>

      <!-- Filters -->
      <div class="filters-row">
        <button class="filter-btn active">All</button>
        <button class="filter-btn">Discussion</button>
        <button class="filter-btn">
          <svg class="icon icon-sm" viewBox="0 0 24 24" style="display:inline;vertical-align:middle;margin-right:0.25rem;"><path d="M2 6h4"/><path d="M2 10h4"/><path d="M2 14h4"/><path d="M2 18h4"/><circle cx="15" cy="10" r="7"/><path d="m21.64 15.23-3.06 3.06"/></svg>
          Tips &amp; Tricks
        </button>
      </div>

      <!-- Threads -->
      <div class="threads-list" id="threadsList">
        <!-- populated by main.js -->
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <a href="terms.html">Terms</a>
    <span class="footer-dot">•</span>
    <a href="privacy.html">Privacy</a>
    <span class="footer-dot">•</span>
    <a href="https://sasankawrites.in/" target="_blank" rel="noopener">Visit Portfolio</a>
